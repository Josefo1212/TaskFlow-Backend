map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name tasksflowcenter.online www.tasksflowcenter.online;

    client_max_body_size 10m;

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name api.tasksflowcenter.online;

    client_max_body_size 10m;

    # La raíz del subdominio API no necesariamente es un endpoint.
    # Responder algo simple evita confusión cuando se prueba "https://api.../".
    location = / {
        return 200 '{"service":"gateway-api","status":"ok","hint":"usa /health o los endpoints (/auth, /users, /projects, /tasks, /tags)"}';
        add_header Content-Type application/json;
    }

    # Evita logs 404 innecesarios del navegador.
    location = /favicon.ico {
        return 204;
    }

    location / {
        proxy_pass http://gateway-api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
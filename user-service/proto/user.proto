syntax = "proto3";

package user;

service UserService {
	rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
	rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
	rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
	rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
	rpc GetUsersByIds(GetUsersByIdsRequest) returns (GetUsersByIdsResponse);
	rpc CheckUserExists(CheckUserExistsRequest) returns (CheckUserExistsResponse);
	rpc GetBasicInfo(GetBasicInfoRequest) returns (GetBasicInfoResponse);
}

message User {
	string id = 1;
	string user = 2;
	string email = 3;
	string phone = 4;
	string bio = 5;
	string created_at = 6;
	string updated_at = 7;
}

message UserBasic {
	string id = 1;
	string user = 2;
	string email = 3;
}

message GetProfileRequest {
	string user_id = 1;
}

message GetProfileResponse {
	User user = 1;
}

message UpdateProfileRequest {
	string user_id = 1;
	optional string phone = 2;
	optional string bio = 3;
}

message UpdateProfileResponse {
	User user = 1;
}

message ListUsersRequest {
	int32 page = 1;
	int32 limit = 2;
	string search = 3;
}

message ListUsersResponse {
	repeated User users = 1;
	int32 total = 2;
	int32 page = 3;
	int32 limit = 4;
}

message SearchUsersRequest {
	string query = 1;
	int32 limit = 2;
}

message SearchUsersResponse {
	repeated UserBasic users = 1;
}

message GetUsersByIdsRequest {
	repeated string user_ids = 1;
}

message GetUsersByIdsResponse {
	repeated UserBasic users = 1;
}

message CheckUserExistsRequest {
	string user_id = 1;
}

message CheckUserExistsResponse {
	bool exists = 1;
	UserBasic user = 2;
}

message GetBasicInfoRequest {
	string user_id = 1;
}

message GetBasicInfoResponse {
	UserBasic user = 1;
}

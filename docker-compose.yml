services:
  proxy:
    container_name: taskflow-proxy
    image: nginx:1.27-alpine
    restart: unless-stopped
    command: /bin/sh -c "while :; do sleep 6h & wait $$!; nginx -s reload; done & nginx -g 'daemon off;'"
    depends_on:
      - gateway-api
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge

  db:
    container_name: tasksflow_db
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - ./db/.env.docker
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend

  redis:
    container_name: taskflow_redis
    image: redis:8-alpine
    restart: unless-stopped
    networks:
      - backend

  auth-service:
    container_name: auth-service
    image: josefo1212/auth-service:3.1.0
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - ./auth-service/.env
      - ./auth-service/.env.docker
    expose:
      - "3001"
    networks:
      - backend

  gateway-api:
    container_name: gateway-api
    image: josefo1212/gateway-api:2.2.0
    restart: unless-stopped
    depends_on:
      - auth-service
      - user-service
    env_file:
      - ./gateway-api/.env
      - ./gateway-api/.env.docker
      - ./gateway-api/.env.prod.docker
    expose:
      - "3003"
    networks:
      - edge
      - backend

  user-service:
    container_name: user-service
    image: josefo1212/user-service:1.0.0
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./user-service/.env
      - ./user-service/.env.docker
    expose:
      - "3002"
    networks:
      - backend

networks:
  edge:
  backend:

volumes:
  db_data:
